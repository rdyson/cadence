<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Cadence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪿</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
    // Apply saved theme before paint to avoid flash
    (function() {
        var t = localStorage.getItem("cadence_theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
    })();
    </script>
</head>
<body>

<!-- Login screen -->
<div id="login-screen" class="hidden">
    <div class="login-card">
        <button id="login-theme-toggle" class="theme-toggle-floating" aria-label="Toggle theme" title="Toggle theme"></button>
        <div class="login-logo">🪿</div>
        <h1 id="login-title">Cadence</h1>
        <p id="login-desc">Keep the pace.</p>
        <form id="login-form">
            <input type="email" id="login-email" placeholder="Email" required autocomplete="email">
            <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
            <button type="submit" id="login-btn">Sign in</button>
        </form>
        <p id="login-error" class="error hidden"></p>
        <p id="login-change-password" class="hint hidden">First sign-in: you'll need to set a new password below.</p>
        <div id="new-password-section" class="hidden">
            <input type="password" id="new-password" placeholder="New password" required>
            <button type="button" id="set-password-btn">Set new password</button>
        </div>
    </div>
</div>

<!-- Main dashboard -->
<div id="app" class="hidden">
    <header>
        <div class="header-left">
            <span class="logo">🪿</span>
            <div>
                <h1 id="project-name">Cadence</h1>
                <p id="project-desc" class="tagline"></p>
            </div>
        </div>
        <div class="header-right">
            <span id="signed-in-as"></span>
            <button id="theme-toggle-btn" aria-label="Toggle theme" title="Toggle theme"></button>
            <button id="sign-out-btn">Sign out</button>
        </div>
    </header>

    <main>
        <!-- Stats bar -->
        <section class="stats-bar">
            <div class="stat-card countdown">
                <div class="stat-label">Days to completion</div>
                <div class="stat-value" id="days-remaining">—</div>
                <div class="stat-sub" id="completion-date-label"></div>
            </div>
            <div id="user-progress-cards"></div>
        </section>

        <!-- Periods -->
        <section id="periods-container"></section>
    </main>
</div>

    <footer id="app-footer" class="hidden">
        <a href="https://github.com/rdyson/cadence" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            <span>Cadence</span>
        </a>
    </footer>

<!-- CRT effects overlay — separate div to avoid Android touch issues with pseudo-elements -->
<div id="crt-overlay" aria-hidden="true">
    <div id="crt-scanlines"></div>
    <div id="crt-vignette"></div>
    <div id="crt-scanbar"></div>
</div>

<script src="app.js"></script>
</body>
</html>
