AWSTemplateFormatVersion: '2010-09-09'
Description: Cadence — self-hosted progress tracker infrastructure

Parameters:
  ProjectName:
    Type: String
    Default: cadence
  DynamoDBTableName:
    Type: String
    Default: cadence
  EnableOtp:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  SesSenderEmail:
    Type: String
    Default: ''
  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing Lambda deployment packages
  LambdaS3Key:
    Type: String
    Description: S3 key for the main Lambda zip
  AuthTriggersS3Key:
    Type: String
    Default: ''
    Description: S3 key for the auth triggers Lambda zip
  CustomDomain:
    Type: String
    Default: ''
    Description: Custom domain name (e.g. cadence.rdyson.dev)
  AcmCertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for the custom domain (must be in us-east-1)

Conditions:
  OtpEnabled: !Equals [!Ref EnableOtp, 'true']
  HasCustomDomain: !Not [!Equals [!Ref CustomDomain, '']]

Resources:
  # ── DynamoDB ────────────────────────────────────────────────────────────────
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DynamoDBTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ── IAM Role ────────────────────────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaRoleDynamoPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub '${ProjectName}-dynamodb-access'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: 'dynamodb:*'
            Resource: !GetAtt DynamoDBTable.Arn
      Roles:
        - !Ref LambdaRole

  LambdaRoleSesPolicy:
    Type: AWS::IAM::Policy
    Condition: OtpEnabled
    Properties:
      PolicyName: !Sub '${ProjectName}-ses-send'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: ses:SendEmail
            Resource: '*'
      Roles:
        - !Ref LambdaRole

  # ── Lambda Functions ────────────────────────────────────────────────────────
  ApiLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      Runtime: python3.12
      Handler: lambda_function.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 15
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DynamoDBTableName

  AuthTriggersLambda:
    Type: AWS::Lambda::Function
    Condition: OtpEnabled
    Properties:
      FunctionName: !Sub '${ProjectName}-auth-triggers'
      Runtime: python3.12
      Handler: auth_triggers.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 15
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref AuthTriggersS3Key
      Environment:
        Variables:
          SES_SENDER: !Ref SesSenderEmail

  # ── Cognito ─────────────────────────────────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ProjectName}-users'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireNumbers: false
          RequireSymbols: false
      LambdaConfig: !If
        - OtpEnabled
        - DefineAuthChallenge: !GetAtt AuthTriggersLambda.Arn
          CreateAuthChallenge: !GetAtt AuthTriggersLambda.Arn
          VerifyAuthChallengeResponse: !GetAtt AuthTriggersLambda.Arn
        - !Ref AWS::NoValue

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-web'
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows: !If
        - OtpEnabled
        - - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_CUSTOM_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        - - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH

  AuthTriggersPermission:
    Type: AWS::Lambda::Permission
    Condition: OtpEnabled
    Properties:
      FunctionName: !GetAtt AuthTriggersLambda.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  # ── API Gateway ─────────────────────────────────────────────────────────────
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiLambda.Arn
      PayloadFormatVersion: '2.0'

  HttpApiAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      AuthorizerType: JWT
      IdentitySource:
        - $request.header.Authorization
      Name: cognito
      JwtConfiguration:
        Audience:
          - !Ref CognitoUserPoolClient
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}'

  HttpApiRouteGetState:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /state
      Target: !Sub 'integrations/${HttpApiIntegration}'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer

  HttpApiRoutePostState:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /state
      Target: !Sub 'integrations/${HttpApiIntegration}'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer

  HttpApiRouteOptions:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'OPTIONS /{proxy+}'
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  # ── S3 + CloudFront ─────────────────────────────────────────────────────────
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-oac'
        Description: !Sub '${ProjectName} S3 OAC'
        SigningProtocol: sigv4
        SigningBehavior: always
        OriginAccessControlOriginType: s3

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub '${ProjectName} dashboard'
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        DefaultRootObject: index.html
        Aliases: !If
          - HasCustomDomain
          - - !Ref CustomDomain
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref AWS::NoValue
        Origins:
          - Id: !Ref S3Bucket
            DomainName: !GetAtt S3Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref CloudFrontOAC
        DefaultCacheBehavior:
          TargetOriginId: !Ref S3Bucket
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods:
            - HEAD
            - GET
          CachedMethods:
            - HEAD
            - GET
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: '200'
            ErrorCachingMinTTL: 0

  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${S3Bucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

Outputs:
  ApiUrl:
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
  CognitoClientId:
    Value: !Ref CognitoUserPoolClient
  S3BucketName:
    Value: !Ref S3Bucket
  CloudFrontUrl:
    Value: !If
      - HasCustomDomain
      - !Sub 'https://${CustomDomain}'
      - !Sub 'https://${CloudFrontDistribution.DomainName}'
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
